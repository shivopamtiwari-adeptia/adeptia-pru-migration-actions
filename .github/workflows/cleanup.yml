name: Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — list what would be deleted without deleting'
        required: true
        type: boolean
        default: true
      delete_old_zips:
        description: 'Delete export ZIPs older than 30 days from artifacts/'
        required: true
        type: boolean
        default: true
      delete_stale_branches:
        description: 'Delete merged migration/ branches'
        required: true
        type: boolean
        default: true

jobs:
  cleanup:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Cleanup old export ZIPs
        if: inputs.delete_old_zips == true
        run: |
          echo "=== Export ZIPs older than 30 days ==="
          find artifacts/ -name "*.zip" -mtime +30 2>/dev/null | while read f; do
            echo "  $f"
            if [ "${{ inputs.dry_run }}" = "false" ]; then
              git rm "$f"
            fi
          done || echo "No old ZIPs found"

      - name: Cleanup stale migration branches
        if: inputs.delete_stale_branches == true
        run: |
          echo "=== Merged migration/ branches ==="
          git fetch --prune origin
          git branch -r --merged origin/main | grep 'origin/migration/' | sed 's|origin/||' | while read branch; do
            echo "  $branch"
            if [ "${{ inputs.dry_run }}" = "false" ]; then
              git push origin --delete "$branch"
              echo "  Deleted: $branch"
            fi
          done || echo "No stale branches found"

      - name: Commit deletions
        if: inputs.dry_run == false && inputs.delete_old_zips == true
        run: |
          git config user.name "github-actions"
          git config user.email "ci-service@adeptia.com"
          git diff --cached --quiet || (
            git commit -m "cleanup: remove old export ZIPs [run ${{ github.run_number }}]"
            git pull --rebase origin main
            git push origin HEAD:main
          )

      - name: Summary
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN complete — no changes made. Re-run with dry_run=false to apply."
          else
            echo "Cleanup complete."
          fi
